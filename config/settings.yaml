# 분석 엔진 임계값 및 가중치
# settings.yaml의 모든 값은 코드에서 오버라이드 없이 읽힘

cache:
  dir: "src/ai_stock/cache"
  ttl_hours: 18  # 일일 분석엔 18시간이면 충분

signals:
  short_term:
    # 0~100 점수. 가중치 합 = 1.0
    weights:
      rsi: 0.20             # RSI 30~70 중립, 30 이하면 매수신호 가산
      macd: 0.20            # MACD 시그널 라인 위 = +
      ma50_distance: 0.20   # 50일 이평 대비 -3~+5% 구간이 우호
      volume_spike: 0.15    # 20일 거래량 Z-score > 1.5 = 관심
      momentum_5_20: 0.25   # 5일/20일 가격 모멘텀
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9

  mid_term:
    weights:
      ma200_position: 0.25
      earnings_trend: 0.30    # 분기 매출/EPS YoY
      consensus_revision: 0.25
      relative_strength: 0.20  # 섹터 대비
    earnings_lookback_quarters: 4

  long_term:
    weights:
      revenue_cagr: 0.30
      margin_trend: 0.20
      ev_sales_percentile: 0.20  # 5년 분위, 낮을수록 +
      peg: 0.15
      capital_allocation: 0.15
    cagr_years: 3

# 종합 라벨링 임계값 (단/중/장 가중평균)
verdict:
  weights: { short: 0.25, mid: 0.35, long: 0.40 }
  thresholds:
    strong_buy: 75
    accumulate: 60
    hold: 45
    trim: 30
    # 그 이하는 AVOID

theme:
  weights:
    return_1w: 0.30
    return_1m: 0.40
    return_3m: 0.30
  leader_weights:
    market_cap: 0.40
    avg_dollar_volume_60d: 0.30
    momentum_3m: 0.30

llm:
  model: "claude-opus-4-7"  # 최신 Opus
  fallback_model: "claude-sonnet-4-6"
  max_tokens: 2000
  temperature: 0.4
  use_prompt_caching: true

news:
  max_articles_per_run: 200
  top_n_in_report: 10
  rss_feeds:
    - https://feeds.reuters.com/reuters/businessNews
    - https://feeds.bloomberg.com/markets/news.rss
    - https://www.cnbc.com/id/15839135/device/rss/rss.html
    - https://feeds.feedburner.com/TechCrunch/
    # 한국
    - https://www.hankyung.com/feed/it
    - https://rss.etnews.com/Section903.xml

report:
  top_n_focus_stocks: 5
  include_macro_snapshot: true
  include_position_review: true
