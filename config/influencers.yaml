# ApeWisdom 통합 (코인별 멘션 카운트 + 24h 델타)
apewisdom:
  enabled: true
  endpoint: "https://apewisdom.io/api/v1.0/filter/all-crypto/page/1"
  # 24h 멘션이 N% 급증하면 'rising trend' 신호
  rising_threshold_pct: 100  # 2배 이상 증가
  top_n: 15

# Twitter 직접 수집 (옵션 — 무료 RSS 브릿지, 신뢰성 낮음)
twitter_rss:
  enabled: false  # 기본 끔; 안정적 RSS 브릿지 확보되면 켜기
  # Nitter는 대부분 인스턴스가 죽어있음. RSSHub 셀프호스팅이나 rss.app 같은 유료 서비스 추천
  # nitter_instance: "https://nitter.net"  # 대부분 죽음
  # rsshub_instance: "https://rsshub.app"  # 공용은 rate limit 심함, 자체 호스팅 권장

# 향후 X API Pro 통합 (월 $200) 시 채워질 영역
x_api:
  enabled: false
  # bearer_token: ENV
