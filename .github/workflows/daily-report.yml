name: Daily AI Stock Report

on:
  schedule:
    # 미국장 마감(NY 16:00 = UTC 21:00) 30분 후 = UTC 21:30 (한국시간 06:30)
    # 화~토 (UTC) = 미국장 월~금 마감
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: uv sync

      - name: Generate daily reports + JSON + HTML site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SORSA_API_KEY: ${{ secrets.SORSA_API_KEY }}
        run: uv run ai-stock daily

      - name: Commit reports + JSON data (force-add web/data)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git add -f web/data/
          if git diff --staged --quiet; then
            echo "No new report changes."
          else
            git commit -m "daily report $(date +%F)"
            for attempt in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true
              if git push origin "HEAD:${GITHUB_REF_NAME:-main}"; then
                echo "Push succeeded on attempt $attempt."
                break
              fi
              echo "Push attempt $attempt rejected; retrying..."
              sleep 2
            done
          fi
        continue-on-error: true

      # Vercel auto-deploys on push to main when project is connected.
      # No deploy hook needed if Vercel watches this repo's main branch.
      # If using a deploy hook (recommended for finer control), set
      # VERCEL_DEPLOY_HOOK_URL secret and the step below will trigger it.
      - name: Trigger Vercel deploy hook (optional)
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
            echo "Vercel deploy triggered."
          fi

      # Keep the legacy GitHub Pages deploy as a fallback while migrating.
      # Remove this entire job once Vercel is confirmed working.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
