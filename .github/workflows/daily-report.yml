name: Daily AI Stock Report

on:
  schedule:
    # 미국장 마감(NY 16:00 = UTC 21:00) 30분 후 = UTC 21:30 (한국시간 06:30)
    # 화~토 (UTC) = 미국장 월~금 마감
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/ai-investment-analysis-083bm
    paths:
      - '.github/workflows/daily-report.yml'
      - 'src/ai_stock/report/templates/site_*.html.j2'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Generate daily report + site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run ai-stock daily

      - name: Commit & push markdown report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new report changes."
          else
            git commit -m "daily report $(date +%F)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
